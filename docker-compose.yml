services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medsoft
      POSTGRES_PASSWORD: medsoft
      POSTGRES_DB: medsoft
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://medsoft:medsoft@db:5432/medsoft
    depends_on:
      - db

volumes:
  pgdata:
